<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-eval' 'wasm-unsafe-eval'; connect-src 'self' https://cdn.jsdelivr.net https://storage.googleapis.com data: blob:; worker-src blob:; media-src 'self' blob:;" />
    <title>turtle-coach · 카메라</title>
    <style>
      html, body {
        margin: 0; padding: 0;
        height: 100%; width: 100%;
        background: #111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "맑은 고딕", sans-serif;
        color: #eee;
        overflow: hidden;
        border-radius: 10px;
        -webkit-user-select: none;
      }
      #wrap {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      }
      /* 윈도우 전체를 드래그 핸들로 — 사용자가 PIP를 자유롭게 옮길 수 있음 */
      #wrap { -webkit-app-region: drag; }
      video {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        /* 셀카처럼 좌우 반전 */
        transform: scaleX(-1);
      }
      #status {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        padding: 8px 12px;
        font-size: 12px;
        background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
        color: #fff;
        line-height: 1.4;
        text-align: center;
        pointer-events: none;
      }
      #header {
        position: absolute;
        left: 0; right: 0; top: 0;
        padding: 6px 10px;
        font-size: 11px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0));
        color: rgba(255,255,255,0.85);
        display: flex; align-items: center; gap: 6px;
        pointer-events: none;
      }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #ff5252;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <video id="cam" autoplay playsinline muted></video>
      <div id="header"><span class="dot"></span>거북이 코치 — 카메라</div>
      <div id="status">초기화 중…</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
    <script src="./detector.js"></script>
  </body>
</html>
